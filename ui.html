<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --soil-dark:   #3D2008;
    --soil:        #5C3A1E;
    --soil-light:  #8B5E3C;
    --soil-pale:   #C4956A;
    --leaf-dark:   #2E5C3A;
    --leaf:        #4A7C59;
    --leaf-light:  #6DAA7D;
    --leaf-pale:   #D4EEE0;
    --cream:       #FDF6E3;
    --cream-dark:  #F0E6CE;
    --text:        #2C1810;
    --text-mid:    #6B4C35;
    --text-muted:  #9C7860;
    --border:      #D4B896;
    --white:       #FFFFFF;
    --danger:      #C0392B;
    --danger-bg:   #FFF0EE;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--cream);
    color: var(--text);
    font-size: 13px;
    line-height: 1.45;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    background: var(--soil-dark);
    color: var(--white);
    padding: 11px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .header-icon { font-size: 17px; line-height: 1; }
  .header h1  { font-size: 14px; font-weight: 700; letter-spacing: -0.2px; }
  .header-sub { font-size: 10px; opacity: 0.6; margin-left: auto; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    background: var(--white);
    border-bottom: 2px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    flex: 1; padding: 9px 4px; border: none; background: none;
    font-size: 12px; font-weight: 600; cursor: pointer;
    color: var(--text-muted); transition: color .15s;
    border-bottom: 2px solid transparent; margin-bottom: -2px;
  }
  .tab.active { color: var(--leaf); border-bottom-color: var(--leaf); }
  .tab:hover:not(.active) { color: var(--text-mid); background: var(--cream); }

  /* ── Panels ── */
  .panel { display: none; flex: 1; overflow-y: auto; padding: 14px; }
  .panel.active { display: block; }

  /* ── Form ── */
  .field { margin-bottom: 12px; }
  .field label {
    display: block; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .6px;
    color: var(--text-muted); margin-bottom: 5px;
  }
  input[type="text"],
  input[type="number"] {
    width: 100%; padding: 8px 10px; font-size: 13px;
    border: 1.5px solid var(--border); border-radius: 6px;
    background: var(--white); color: var(--text);
    outline: none; transition: border-color .15s;
  }
  input:focus { border-color: var(--leaf); }

  .dim-row {
    display: grid; grid-template-columns: 1fr 20px 1fr;
    gap: 6px; align-items: end;
  }
  .dim-sep {
    text-align: center; font-size: 16px; color: var(--text-muted);
    padding-bottom: 8px; user-select: none;
  }

  /* ── Bed preview ── */
  .preview-wrap {
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 10px; margin-bottom: 12px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  #preview-canvas { display: block; }
  .preview-meta { font-size: 11px; color: var(--text-muted); }

  /* ── Buttons ── */
  .btn {
    display: block; width: 100%; padding: 10px; border-radius: 8px;
    border: none; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: background .15s, opacity .15s;
  }
  .btn-primary { background: var(--leaf); color: var(--white); }
  .btn-primary:hover { background: var(--leaf-dark); }
  .btn-primary:disabled { background: var(--border); color: var(--text-muted); cursor: default; }
  .btn-ghost {
    background: transparent; border: 1.5px solid var(--danger);
    color: var(--danger); margin-top: 6px;
  }
  .btn-ghost:hover { background: var(--danger-bg); }

  .tip {
    background: var(--leaf-pale); border-left: 3px solid var(--leaf-light);
    border-radius: 0 6px 6px 0; padding: 8px 10px;
    font-size: 11px; color: var(--leaf-dark); margin-top: 12px; line-height: 1.5;
  }

  /* ── Plants tab ── */
  #tab-plants {
    padding: 0; flex-direction: column;
  }
  #tab-plants.active { display: flex; }

  .plant-search {
    padding: 10px 14px 8px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .plant-search input {
    width: 100%; padding: 7px 10px; font-size: 13px;
    border: 1.5px solid var(--border); border-radius: 6px; outline: none;
  }
  .plant-search input:focus { border-color: var(--leaf); }

  .plant-list { flex: 1; overflow-y: auto; padding: 6px 8px; }

  .plant-category {
    font-size: 10px; font-weight: 800; text-transform: uppercase;
    letter-spacing: .7px; color: var(--text-muted);
    padding: 10px 8px 4px;
  }
  .plant-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: 8px; cursor: pointer;
    transition: background .1s; border: 1.5px solid transparent;
  }
  .plant-item:hover { background: var(--cream-dark); }
  .plant-item.selected { background: var(--leaf-pale); border-color: var(--leaf-light); }

  .swatch {
    width: 34px; height: 34px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .plant-info  { flex: 1; min-width: 0; }
  .plant-name  { font-weight: 600; font-size: 12px; color: var(--text); }
  .plant-note  { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
  .plant-badge {
    font-size: 10px; font-weight: 700;
    background: var(--soil-light); color: var(--white);
    padding: 2px 7px; border-radius: 10px; flex-shrink: 0;
    white-space: nowrap;
  }

  .plants-footer {
    padding: 10px 14px; border-top: 1px solid var(--border);
    flex-shrink: 0; background: var(--white);
  }

  /* ── Cell info bar ── */
  .cell-bar {
    border-top: 1.5px solid var(--border); padding: 10px 14px;
    background: var(--white); flex-shrink: 0;
  }
  .cell-bar-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .6px; color: var(--text-muted); margin-bottom: 6px;
  }
  .cell-empty { font-size: 12px; color: var(--text-muted); font-style: italic; }
  .cell-planted { display: flex; align-items: center; gap: 9px; }
  .cell-swatch {
    width: 30px; height: 30px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .cell-plant-name { font-weight: 600; font-size: 13px; }
  .cell-plant-meta { font-size: 11px; color: var(--text-muted); }

  /* ── Resize handle ── */
  #resize-handle {
    height: 6px; flex-shrink: 0; cursor: ns-resize;
    background: var(--border); opacity: 0.5;
    transition: opacity .15s;
    display: flex; align-items: center; justify-content: center;
  }
  #resize-handle:hover, #resize-handle.dragging { opacity: 1; background: var(--leaf); }
  #resize-handle::before {
    content: ""; display: block;
    width: 24px; height: 2px; border-radius: 2px;
    background: currentColor; opacity: 0.5;
  }

  /* ── Custom plant form ── */
  .custom-section { border-top: 1px solid var(--border); flex-shrink: 0; transition: box-shadow .2s; }
  .custom-section.open { position: relative; z-index: 1; box-shadow: 0 -8px 16px rgba(0, 0, 0, 0.1); }
  .custom-toggle {
    display: flex; align-items: center; gap: 7px;
    width: 100%; padding: 9px 14px; background: none; border: none;
    cursor: pointer; font-size: 12px; font-weight: 600; color: var(--leaf);
    text-align: left; transition: background .1s; outline: none;
  }
  .custom-toggle:hover { background: var(--leaf-pale); }
  .custom-toggle-icon {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--leaf); color: var(--white);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; line-height: 1;
    transition: transform .2s; flex-shrink: 0;
  }
  .custom-toggle-icon.open { transform: rotate(45deg); }
  .custom-form {
    padding: 12px 14px 14px; background: var(--cream-dark);
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px;
  }
  .cf-field { display: flex; flex-direction: column; gap: 4px; }
  .cf-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .5px; color: var(--text-muted);
  }
  .cf-label span { font-weight: 400; text-transform: none; letter-spacing: 0; }
  .cf-attrs { display: flex; gap: 8px; }
  #cf-emoji {
    width: 100%; padding: 7px 4px; font-size: 20px; text-align: center;
    border: 1.5px solid var(--border); border-radius: 6px;
    background: var(--white); outline: none;
  }
  #cf-color {
    width: 100%; height: 36px; padding: 3px;
    border: 1.5px solid var(--border); border-radius: 6px;
    cursor: pointer; background: var(--white); display: block;
  }
  .cf-error {
    font-size: 11px; color: var(--danger); min-height: 14px; margin-top: -4px;
  }
  .btn-sm { padding: 8px 10px; font-size: 12px; }

  /* Delete button on custom plant rows */
  .plant-delete {
    width: 22px; height: 22px; border-radius: 50%; border: none;
    background: transparent; cursor: pointer; color: var(--text-muted);
    font-size: 15px; font-weight: 700; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .1s, color .1s;
  }
  .plant-delete:hover { background: var(--danger-bg); color: var(--danger); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="header-icon">🌱</span>
  <h1>Garden Planner</h1>
  <span class="header-sub">Square Foot Method</span>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" data-tab="new-bed">New Bed</button>
  <button class="tab" data-tab="plants">Plants</button>
</div>

<!-- ── New Bed Panel ── -->
<div id="tab-new-bed" class="panel active">

  <div class="field">
    <label>Bed Name</label>
    <input type="text" id="bed-name" value="Garden Bed A" placeholder="e.g. Raised Bed A">
  </div>

  <div class="field">
    <label>Dimensions (feet)</label>
    <div class="dim-row">
      <input type="number" id="bed-w" value="4" min="1" max="24" step="1" placeholder="W">
      <div class="dim-sep">×</div>
      <input type="number" id="bed-h" value="8" min="1" max="24" step="1" placeholder="H">
    </div>
  </div>

  <div class="preview-wrap">
    <canvas id="preview-canvas"></canvas>
    <div class="preview-meta" id="preview-meta"></div>
  </div>

  <button class="btn btn-primary" id="create-btn">Create Garden Bed</button>

  <div class="tip">
    After placing the bed, <strong>double-click</strong> into it to select individual cells, then switch to <em>Plants</em> to assign crops.
  </div>
</div>

<!-- ── Plants Panel ── -->
<div id="tab-plants" class="panel">
  <div class="plant-search">
    <input type="text" id="plant-search" placeholder="Search plants or categories…">
  </div>
  <div class="plant-list" id="plant-list"></div>

  <!-- Custom plant form -->
  <div class="custom-section">
    <button class="custom-toggle" id="custom-toggle">
      <span class="custom-toggle-icon" id="custom-toggle-icon">+</span>
      Add Custom Plant
    </button>
    <div class="custom-form" id="custom-form" style="display:none">
      <div class="cf-field">
        <label class="cf-label" for="cf-name">Name</label>
        <input type="text" id="cf-name" placeholder="e.g. Dragon Tongue Bean">
      </div>
      <div class="cf-attrs">
        <div class="cf-field" style="width:52px;flex-shrink:0">
          <label class="cf-label" for="cf-emoji">Emoji</label>
          <input type="text" id="cf-emoji" placeholder="🌱" maxlength="2">
        </div>
        <div class="cf-field" style="width:52px;flex-shrink:0">
          <label class="cf-label" for="cf-color">Color</label>
          <input type="color" id="cf-color" value="#4A7C59">
        </div>
        <div class="cf-field" style="flex:1">
          <label class="cf-label" for="cf-per">Per sq ft</label>
          <input type="number" id="cf-per" value="1" min="1" max="32" step="1">
        </div>
      </div>
      <div class="cf-field">
        <label class="cf-label" for="cf-note">Notes <span>(optional)</span></label>
        <input type="text" id="cf-note" placeholder="Growing tips, season…">
      </div>
      <div class="cf-error" id="cf-error"></div>
      <button class="btn btn-primary btn-sm" id="cf-add-btn">Add to My Plants</button>
    </div>
  </div>

  <div class="plants-footer">
    <button class="btn btn-primary" id="assign-btn" disabled>Assign to Selected Cell(s)</button>
  </div>
</div>

<!-- Resize handle -->
<div id="resize-handle"></div>

<!-- Cell info bar (shared across tabs, always visible when a cell is selected) -->
<div class="cell-bar" id="cell-bar" style="display:none">
  <div class="cell-bar-label">Selected Cell</div>
  <div id="cell-bar-content"></div>
</div>

<script>
// ─── Plant database ───────────────────────────────────────────────────────────

const PLANTS = [

  { category: "Brassicas",    name: "Broccoli",  emoji: "🥦", color: "#388E3C", perSquare: 1,  note: "Full sun, cool season" },

  { category: "Greens",       name: "Arugula",   emoji: "🌿", color: "#8BC34A", perSquare: 4,  note: "Quick grower" },
  { category: "Greens",       name: "Mustard Greens", emoji: "🌿", color: "#CDDC39", perSquare: 4, note: "Spicy, quick" },

  // Root Vegetables
  { category: "Root Veg",     name: "Carrot",    emoji: "🥕", color: "#FF7043", perSquare: 16, note: "Deep, loose soil" },
  { category: "Root Veg",     name: "Radish",    emoji: "🔴", color: "#E91E63", perSquare: 16, note: "20–30 days to harvest" },
  { category: "Root Veg",     name: "Beets",     emoji: "🟣", color: "#880E4F", perSquare: 9,  note: "Greens also edible" },
  { category: "Root Veg",     name: "Turnip",    emoji: "🟣", color: "#9C27B0", perSquare: 9,  note: "Fast, dual-purpose" },
  { category: "Root Veg",     name: "Parsnip",   emoji: "🟡", color: "#F9A825", perSquare: 9,  note: "Long season" },

  // Alliums
  { category: "Alliums",      name: "Onion",     emoji: "🧅", color: "#FF8F00", perSquare: 9,  note: "Full sun" },
  { category: "Alliums",      name: "Garlic",    emoji: "🧄", color: "#FDD835", perSquare: 9,  note: "Plant in fall" },
  { category: "Alliums",      name: "Green Onion",emoji: "🌿", color: "#AED581", perSquare: 16, note: "Continuous harvest" },
  { category: "Alliums",      name: "Leek",      emoji: "🌿", color: "#66BB6A", perSquare: 9,  note: "Long season" },

  // Legumes
  { category: "Legumes",      name: "Bush Beans",emoji: "🫘", color: "#66BB6A", perSquare: 8,  note: "Nitrogen fixer" },
  { category: "Legumes",      name: "Peas",      emoji: "🟢", color: "#43A047", perSquare: 8,  note: "Cool season, trellis" },
  { category: "Legumes",      name: "Edamame",   emoji: "🫘", color: "#8BC34A", perSquare: 4,  note: "Warm season" },

  // Herbs
  { category: "Herbs",        name: "Basil",     emoji: "🌿", color: "#26A69A", perSquare: 4,  note: "Good near tomatoes" },
  { category: "Herbs",        name: "Parsley",   emoji: "🌿", color: "#4CAF50", perSquare: 4,  note: "Biennial" },
  { category: "Herbs",        name: "Cilantro",  emoji: "🌿", color: "#9CCC65", perSquare: 9,  note: "Bolt-resistant var." },
  { category: "Herbs",        name: "Dill",      emoji: "🌿", color: "#C6E03A", perSquare: 4,  note: "Great with carrots" },
  { category: "Herbs",        name: "Chives",    emoji: "🌿", color: "#81C784", perSquare: 6,  note: "Perennial, pollinator" },
  { category: "Herbs",        name: "Mint",      emoji: "🌿", color: "#26C6DA", perSquare: 1,  note: "Grow in a pot!" },
  { category: "Herbs",        name: "Rosemary",  emoji: "🌿", color: "#0097A7", perSquare: 1,  note: "Perennial, drought ok" },
  { category: "Herbs",        name: "Thyme",     emoji: "🌿", color: "#789262", perSquare: 4,  note: "Perennial, low-growing" },
  { category: "Herbs",        name: "Sage",      emoji: "🌿", color: "#78909C", perSquare: 1,  note: "Perennial, semi-woody" },
  { category: "Herbs",        name: "Oregano",   emoji: "🌿", color: "#558B2F", perSquare: 4,  note: "Perennial, drought ok" },

  // Flowers (companion planting)
  { category: "Companions",   name: "Marigold",  emoji: "🌼", color: "#FFB300", perSquare: 4,  note: "Repels pests" },
  { category: "Companions",   name: "Nasturtium",emoji: "🌸", color: "#F4511E", perSquare: 4,  note: "Trap crop, edible" },
  { category: "Companions",   name: "Borage",    emoji: "💙", color: "#3F51B5", perSquare: 1,  note: "Attracts pollinators" },
  { category: "Companions",   name: "Calendula", emoji: "🌼", color: "#FB8C00", perSquare: 4,  note: "Pollinator magnet" },
];

// ─── State ────────────────────────────────────────────────────────────────────

let selectedPlant  = null;
let selectionState = { isBedCell: false, plant: null, count: 0 };
let searchQuery    = "";
let customPlants   = []; // persisted via clientStorage

// ─── Tab switching ────────────────────────────────────────────────────────────

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    const id = tab.dataset.tab;
    document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t === tab));
    document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === `tab-${id}`));
  });
});

// ─── Bed preview canvas ────────────────────────────────────────────────────────

function drawPreview() {
  const w = Math.max(1, parseInt(document.getElementById("bed-w").value) || 4);
  const h = Math.max(1, parseInt(document.getElementById("bed-h").value) || 8);
  const canvas = document.getElementById("preview-canvas");
  const ctx    = canvas.getContext("2d");

  const MAX_W = 290, MAX_H = 140;
  const scale = Math.min(MAX_W / w, MAX_H / h, 28);
  const pw = w * scale, ph = h * scale;

  canvas.width  = MAX_W;
  canvas.height = MAX_H;

  ctx.clearRect(0, 0, MAX_W, MAX_H);

  const ox = (MAX_W - pw) / 2;
  const oy = (MAX_H - ph) / 2;
  const r  = Math.min(6, scale * 0.1);
  const gap = Math.max(1, scale * 0.05);

  // Bed background
  ctx.fillStyle = "#3D2008";
  roundRect(ctx, ox, oy, pw, ph, r);
  ctx.fill();

  // Cells
  for (let row = 0; row < h; row++) {
    for (let col = 0; col < w; col++) {
      ctx.fillStyle = "#C4956A";
      const cr = Math.max(1, r * 0.4);
      roundRect(ctx, ox + col * scale + gap, oy + row * scale + gap, scale - gap * 2, scale - gap * 2, cr);
      ctx.fill();
    }
  }

  document.getElementById("preview-meta").textContent =
    `${w} × ${h} ft  ·  ${w * h} square feet`;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

document.getElementById("bed-w").addEventListener("input", drawPreview);
document.getElementById("bed-h").addEventListener("input", drawPreview);
drawPreview();

// ─── Create bed ───────────────────────────────────────────────────────────────

document.getElementById("create-btn").addEventListener("click", () => {
  const w    = Math.max(1, Math.min(24, parseInt(document.getElementById("bed-w").value) || 4));
  const h    = Math.max(1, Math.min(24, parseInt(document.getElementById("bed-h").value) || 8));
  const name = document.getElementById("bed-name").value.trim() || "Garden Bed";
  parent.postMessage({ pluginMessage: { type: "create-bed", width: w, height: h, name } }, "*");
});

// ─── Plant list ───────────────────────────────────────────────────────────────

function renderPlants() {
  const q   = searchQuery.toLowerCase();
  const all = [...PLANTS, ...customPlants].filter(p =>
    !q ||
    p.name.toLowerCase().includes(q) ||
    p.category.toLowerCase().includes(q) ||
    p.note.toLowerCase().includes(q)
  );

  // Group by category, preserving insertion order
  const groups = {};
  for (const p of all) {
    (groups[p.category] = groups[p.category] || []).push(p);
  }

  const container = document.getElementById("plant-list");
  container.innerHTML = "";

  for (const [cat, items] of Object.entries(groups)) {
    const header = document.createElement("div");
    header.className = "plant-category";
    header.textContent = cat;
    container.appendChild(header);

    for (const plant of items) {
      const isCustom = plant.category === "Custom";
      const el = document.createElement("div");
      el.className = "plant-item" + (selectedPlant?.name === plant.name ? " selected" : "");
      el.innerHTML = `
        <div class="swatch" style="background:${plant.color}22; color:${plant.color}">${plant.emoji}</div>
        <div class="plant-info">
          <div class="plant-name">${plant.name}</div>
          <div class="plant-note">${plant.note || "Custom plant"}</div>
        </div>
        <div class="plant-badge">${plant.perSquare}/sqft</div>
        ${isCustom ? `<button class="plant-delete" title="Remove custom plant">×</button>` : ""}
      `;

      el.addEventListener("click", (e) => {
        if (e.target.classList.contains("plant-delete")) return;
        selectedPlant = plant;
        renderPlants();
        updateAssignBtn();
      });

      if (isCustom) {
        el.querySelector(".plant-delete").addEventListener("click", (e) => {
          e.stopPropagation();
          deleteCustomPlant(plant.name);
        });
      }

      container.appendChild(el);
    }
  }

  if (container.children.length === 0) {
    container.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px">No plants match "${q}"</div>`;
  }
}

document.getElementById("plant-search").addEventListener("input", (e) => {
  searchQuery = e.target.value;
  renderPlants();
});

renderPlants();

// ─── Custom plant form ────────────────────────────────────────────────────────

document.getElementById("custom-toggle").addEventListener("click", () => {
  const form    = document.getElementById("custom-form");
  const icon    = document.getElementById("custom-toggle-icon");
  const section = document.getElementById("custom-section");
  const opening = form.style.display === "none";
  form.style.display = opening ? "block" : "none";
  icon.classList.toggle("open", opening);
  section.classList.toggle("open", opening);
  if (opening) document.getElementById("cf-name").focus();
});

document.getElementById("cf-add-btn").addEventListener("click", addCustomPlant);
document.getElementById("cf-name").addEventListener("keydown", (e) => {
  if (e.key === "Enter") addCustomPlant();
});

function addCustomPlant() {
  const nameEl = document.getElementById("cf-name");
  const name   = nameEl.value.trim();
  const errEl  = document.getElementById("cf-error");

  errEl.textContent = "";

  if (!name) {
    errEl.textContent = "Please enter a plant name.";
    nameEl.focus();
    return;
  }

  const allNames = [...PLANTS, ...customPlants].map(p => p.name.toLowerCase());
  if (allNames.includes(name.toLowerCase())) {
    errEl.textContent = `"${name}" already exists in the list.`;
    return;
  }

  const plant = {
    category:  "Custom",
    name,
    emoji:     document.getElementById("cf-emoji").value.trim() || "🌱",
    color:     document.getElementById("cf-color").value,
    perSquare: Math.max(1, parseInt(document.getElementById("cf-per").value) || 1),
    note:      document.getElementById("cf-note").value.trim() || "",
  };

  customPlants = [...customPlants, plant];
  saveCustomPlants();

  // Reset form
  nameEl.value = "";
  document.getElementById("cf-note").value = "";
  document.getElementById("cf-per").value  = "1";

  // Auto-select the new plant
  selectedPlant = plant;
  renderPlants();
  updateAssignBtn();
}

function deleteCustomPlant(name) {
  customPlants = customPlants.filter(p => p.name !== name);
  if (selectedPlant?.name === name) selectedPlant = null;
  saveCustomPlants();
  renderPlants();
  updateAssignBtn();
}

function saveCustomPlants() {
  parent.postMessage({ pluginMessage: { type: "save-custom-plants", plants: customPlants } }, "*");
}

// ─── Assign button ────────────────────────────────────────────────────────────

function updateAssignBtn() {
  const btn = document.getElementById("assign-btn");
  const ok  = selectedPlant && selectionState.isBedCell;
  btn.disabled = !ok;
  btn.textContent = selectionState.count > 1
    ? `Assign to ${selectionState.count} Cells`
    : "Assign to Selected Cell";
}

document.getElementById("assign-btn").addEventListener("click", () => {
  if (!selectedPlant || !selectionState.isBedCell) return;
  parent.postMessage({ pluginMessage: { type: "assign-plant", plant: selectedPlant } }, "*");
});

// ─── Cell info bar ────────────────────────────────────────────────────────────

function updateCellBar() {
  const bar  = document.getElementById("cell-bar");
  const body = document.getElementById("cell-bar-content");

  if (!selectionState.isBedCell) {
    bar.style.display = "none";
    return;
  }

  bar.style.display = "block";
  const p = selectionState.plant;

  if (!p) {
    body.innerHTML = `<div class="cell-empty">Empty — select a plant and click Assign</div>`;
  } else {
    body.innerHTML = `
      <div class="cell-planted">
        <div class="cell-swatch" style="background:${p.color}22">${p.emoji}</div>
        <div>
          <div class="cell-plant-name">${p.name}</div>
          <div class="cell-plant-meta">${p.perSquare} per sq ft &middot; ${p.note}</div>
        </div>
      </div>
      <button class="btn btn-ghost" id="clear-btn">Clear Cell</button>
    `;
    document.getElementById("clear-btn").addEventListener("click", () => {
      parent.postMessage({ pluginMessage: { type: "clear-plant" } }, "*");
    });
  }
}

// ─── Messages from plugin ─────────────────────────────────────────────────────

window.addEventListener("message", (event) => {
  const msg = event.data?.pluginMessage;
  if (!msg) return;

  if (msg.type === "custom-plants") {
    customPlants = msg.plants || [];
    renderPlants();
  }

  if (msg.type === "bed-created") {
    // Switch to plants tab automatically
    document.querySelector('[data-tab="plants"]').click();
  }

  if (msg.type === "selection") {
    selectionState = msg;
    updateCellBar();
    updateAssignBtn();
  }
});

// Ask for current selection state on load
parent.postMessage({ pluginMessage: { type: "request-selection" } }, "*");

// ─── Resize handle ────────────────────────────────────────────────────────────

const resizeHandle = document.getElementById("resize-handle");
let dragStartY = 0, dragStartH = 0;

resizeHandle.addEventListener("mousedown", (e) => {
  dragStartY = e.screenY;
  dragStartH = window.outerHeight;
  resizeHandle.classList.add("dragging");
  e.preventDefault();

  const onMove = (e) => {
    const newH = Math.max(300, Math.min(900, dragStartH + (e.screenY - dragStartY)));
    parent.postMessage({ pluginMessage: { type: "resize", height: newH } }, "*");
  };
  const onUp = () => {
    resizeHandle.classList.remove("dragging");
    window.removeEventListener("mousemove", onMove);
    window.removeEventListener("mouseup", onUp);
  };
  window.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", onUp);
});
</script>
</body>
</html>
